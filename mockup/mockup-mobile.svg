  <rect x="20" y="1236" width="350" height="160" rx="12" fill="#ffffff" stroke="#7B1FA2" stroke-width="2"/>
  <rect x="20" y="1236" width="350" height="52" rx="12" fill="#7B1FA2"/>
  <text x="195" y="1270" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">Epidemiologia Regional</text>
  <text x="40" y="1318" font-size="14" fill="#333">Estudos de prevalência de doenças e fatores</text>
  <text x="40" y="1340" font-size="14" fill="#333">de risco específicos das populações insulares.</text>

  <!-- Card Saúde Pública  y=1412..1572 -->
  <rect x="20" y="1412" width="350" height="160" rx="12" fill="#ffffff" stroke="#C62828" stroke-width="2"/>
  <rect x="20" y="1412" width="350" height="52" rx="12" fill="#C62828"/>
  <text x="195" y="1446" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">Saúde Pública</text>
  <text x="40" y="1494" font-size="14" fill="#333">Promoção da saúde, prevenção de doenças e</text>
  <text x="40" y="1516" font-size="14" fill="#333">políticas de saúde baseadas em evidência.</text>

