  <!-- Assunto -->
  <rect x="40" y="3360" width="310" height="40" rx="6" fill="#ffffff" stroke="#ccc"/>
  <text x="56" y="3385" font-size="13" fill="#999">Assunto</text>

  <!-- Mensagem -->
  <rect x="40" y="3412" width="310" height="60" rx="6" fill="#ffffff" stroke="#ccc"/>
