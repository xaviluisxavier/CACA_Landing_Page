  <rect x="20"  y="1816" width="165" height="100" rx="8" fill="#f5f5f5" stroke="#ddd"/>
  <text x="102" y="1860" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Governo Regional</text>
  <text x="102" y="1878" text-anchor="middle" font-size="13" font-weight="600" fill="#333">dos Açores</text>

  <rect x="205" y="1816" width="165" height="100" rx="8" fill="#f5f5f5" stroke="#ddd"/>
  <text x="287" y="1860" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Centros de</text>
  <text x="287" y="1878" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Investigação</text>

