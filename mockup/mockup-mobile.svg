<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 3708" style="background:#f8f9fa;">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976D2;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="sectionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f0f4f8;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- ══════════════════════════════
       HEADER  y=0..70
  ══════════════════════════════ -->
  <rect x="0" y="0" width="390" height="70" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <circle cx="38" cy="35" r="22" fill="url(#heroGrad)"/>
  <text x="38" y="40" text-anchor="middle" font-size="10" font-weight="bold" fill="white">CACA</text>
  <text x="68" y="27" font-size="12" font-weight="700" fill="#1976D2" font-family="'Segoe UI',Arial,sans-serif">Centro Académico Clínico dos Açores</text>
  <text x="68" y="46" font-size="10" fill="#666" font-family="'Segoe UI',Arial,sans-serif">Inovação e Excelência em Saúde</text>
  <rect x="344" y="18" width="34" height="34" rx="6" fill="#f0f4f8" stroke="#e0e0e0" stroke-width="1"/>
  <text x="361" y="41" text-anchor="middle" font-size="20" fill="#1976D2">☰</text>

  <!-- ══════════════════════════════
       HERO  y=70..530
  ══════════════════════════════ -->
  <rect x="0" y="70" width="390" height="460" fill="url(#heroGrad)"/>
  <circle cx="330" cy="160" r="100" fill="#ffffff" opacity="0.05"/>
  <circle cx="300" cy="340" r="75"  fill="#ffffff" opacity="0.05"/>
  <circle cx="365" cy="460" r="55"  fill="#ffffff" opacity="0.04"/>

  <text x="24" y="138" font-size="30" font-weight="700" fill="#ffffff" font-family="'Segoe UI',Arial,sans-serif">Construindo o Futuro</text>
  <text x="24" y="174" font-size="30" font-weight="700" fill="#ffffff" font-family="'Segoe UI',Arial,sans-serif">da Saúde nos Açores</text>

  <text x="24" y="214" font-size="14" fill="#e3f2fd" font-family="Georgia,serif">Uma parceria inovadora entre a Universidade</text>
  <text x="24" y="234" font-size="14" fill="#e3f2fd" font-family="Georgia,serif">dos Açores e instituições de saúde regionais,</text>
  <text x="24" y="254" font-size="14" fill="#e3f2fd" font-family="Georgia,serif">dedicada à investigação clínica de excelência,</text>
  <text x="24" y="274" font-size="14" fill="#e3f2fd" font-family="Georgia,serif">ao ensino de qualidade e à melhoria dos</text>
  <text x="24" y="294" font-size="14" fill="#e3f2fd" font-family="Georgia,serif">cuidados de saúde.</text>

  <rect x="24" y="316" width="232" height="48" rx="24" fill="#43A047"/>
  <text x="140" y="345" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">Conheça as Nossas Áreas</text>

  <rect x="24" y="382" width="342" height="100" rx="10" fill="#ffffff" opacity="0.12"/>
  <text x="195" y="438" text-anchor="middle" font-size="12" fill="#ffffff" opacity="0.7">[Imagem: Paisagem dos Açores / Campus Universitário]</text>

  <!-- ══════════════════════════════
       ÁREAS DE INVESTIGAÇÃO  y=530..1590
       5 cards × 180px + header 100px + gaps 16px
  ══════════════════════════════ -->
  <rect x="0" y="530" width="390" height="1060" fill="url(#sectionGrad)"/>

  <text x="195" y="584" text-anchor="middle" font-size="26" font-weight="700" fill="#1976D2" font-family="'Segoe UI',Arial">Áreas de Investigação</text>
  <text x="195" y="608" text-anchor="middle" font-size="13" fill="#666" font-family="Georgia,serif">Desenvolvendo soluções inovadoras para os</text>
  <text x="195" y="626" text-anchor="middle" font-size="13" fill="#666" font-family="Georgia,serif">desafios da saúde regional e global</text>

  <!-- Card e-Saúde  y=648..828 -->
  <rect x="20" y="648" width="350" height="180" rx="12" fill="#ffffff" stroke="#1976D2" stroke-width="2"/>
  <rect x="20" y="648" width="350" height="52" rx="12" fill="#1976D2"/>
  <text x="195" y="682" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">e-Saúde</text>
  <text x="40" y="730" font-size="14" fill="#333">Desenvolvimento de plataformas digitais para</text>
  <text x="40" y="752" font-size="14" fill="#333">gestão de saúde, telesaúde e monitorização</text>
  <text x="40" y="774" font-size="14" fill="#333">remota de pacientes nas ilhas.</text>

  <!-- Card IA  y=844..1024 -->
  <rect x="20" y="844" width="350" height="180" rx="12" fill="#ffffff" stroke="#43A047" stroke-width="2"/>
  <rect x="20" y="844" width="350" height="52" rx="12" fill="#43A047"/>
  <text x="195" y="878" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">Inteligência Artificial</text>
  <text x="40" y="926" font-size="14" fill="#333">Aplicação de machine learning para diagnóstico</text>
  <text x="40" y="948" font-size="14" fill="#333">precoce, análise preditiva e personalização de</text>
  <text x="40" y="970" font-size="14" fill="#333">tratamentos médicos.</text>

  <!-- Card Telemedicina  y=1040..1220 -->
  <rect x="20" y="1040" width="350" height="180" rx="12" fill="#ffffff" stroke="#FF6F00" stroke-width="2"/>
  <rect x="20" y="1040" width="350" height="52" rx="12" fill="#FF6F00"/>
  <text x="195" y="1074" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">Telemedicina</text>
  <text x="40" y="1122" font-size="14" fill="#333">Soluções de teleconsulta e apoio à decisão</text>
  <text x="40" y="1144" font-size="14" fill="#333">clínica para populações insulares e áreas</text>
  <text x="40" y="1166" font-size="14" fill="#333">remotas dos Açores.</text>

