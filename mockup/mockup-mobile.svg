  <text x="44" y="3136" font-size="13" fill="#666">+351 296 650 000</text>

  <text x="44" y="3164" font-size="14" font-weight="600" fill="#1976D2">📍 Morada:</text>
  <text x="44" y="3184" font-size="13" fill="#666">Campus de Ponta Delgada, Rua da Mãe de Deus</text>

  <!-- Form box  y=3208..3368 -->
  <rect x="20" y="3208" width="350" height="292" rx="12" fill="#f8f9fa" stroke="#e0e0e0"/>
  <text x="195" y="3242" text-anchor="middle" font-size="16" font-weight="700" fill="#333">Envie uma Mensagem</text>

  <!-- Nome -->
  <rect x="40" y="3256" width="310" height="40" rx="6" fill="#ffffff" stroke="#ccc"/>
