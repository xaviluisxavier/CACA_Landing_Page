  <text x="195" y="1648" text-anchor="middle" font-size="26" font-weight="700" fill="#1976D2">Nossos Parceiros</text>
  <text x="195" y="1672" text-anchor="middle" font-size="13" fill="#666" font-family="Georgia,serif">Trabalhando juntos pela saúde dos Açores</text>

  <!-- Row 1 -->
  <rect x="20"  y="1700" width="165" height="100" rx="8" fill="#f5f5f5" stroke="#ddd"/>
  <text x="102" y="1744" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Universidade</text>
  <text x="102" y="1762" text-anchor="middle" font-size="13" font-weight="600" fill="#333">dos Açores</text>

  <rect x="205" y="1700" width="165" height="100" rx="8" fill="#f5f5f5" stroke="#ddd"/>
  <text x="287" y="1744" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Hospital Regional</text>
  <text x="287" y="1762" text-anchor="middle" font-size="13" font-weight="600" fill="#333">dos Açores</text>

