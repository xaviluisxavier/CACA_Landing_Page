  <text x="195" y="2421" text-anchor="middle" font-size="28">🔬</text>
  <text x="195" y="2460" text-anchor="middle" font-size="18" font-weight="700" fill="#333">Projetos</text>
  <text x="40" y="2492" font-size="14" fill="#666">Oportunidades de participação em projetos</text>
  <text x="40" y="2512" font-size="14" fill="#666">de investigação inovadores.</text>

  <!-- Card Teses  y=2548..2728 -->
  <rect x="20" y="2548" width="350" height="180" rx="12" fill="#ffffff" stroke="#FF6F00" stroke-width="2"/>
  <circle cx="195" cy="2610" r="28" fill="#FF6F00" opacity="0.10"/>
  <text x="195" y="2621" text-anchor="middle" font-size="28">📚</text>
  <text x="195" y="2660" text-anchor="middle" font-size="18" font-weight="700" fill="#333">Teses</text>
  <text x="40" y="2692" font-size="14" fill="#666">Temas de investigação para mestrados</text>
  <text x="40" y="2712" font-size="14" fill="#666">e doutoramentos em saúde.</text>

  <!-- Card Bolsas  y=2748..2928 -->
  <rect x="20" y="2748" width="350" height="180" rx="12" fill="#ffffff" stroke="#7B1FA2" stroke-width="2"/>
  <circle cx="195" cy="2810" r="28" fill="#7B1FA2" opacity="0.10"/>
  <text x="195" y="2821" text-anchor="middle" font-size="28">💰</text>
  <text x="195" y="2860" text-anchor="middle" font-size="18" font-weight="700" fill="#333">Bolsas</text>
  <text x="40" y="2892" font-size="14" fill="#666">Bolsas de investigação para estudantes</text>
  <text x="40" y="2912" font-size="14" fill="#666">e investigadores.</text>

  <!-- ══════════════════════════════
